name: release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to cross-compile binaries
# for macOS/Linux/Windows and attach them to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 Linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        # cd into the output dir first so the archive holds a *bare* `vastline[.exe]`
        # (the installers extract it directly — no nested target/.../release/ path).
        run: |
          name="vastline-${{ matrix.target }}"
          cd "target/${{ matrix.target }}/release"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$GITHUB_WORKSPACE/${name}.zip" vastline.exe
          else
            tar -czf "$GITHUB_WORKSPACE/${name}.tar.gz" vastline
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: vastline-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
